<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UrbanTrack</title>

    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="admin-page">

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-brand">UrbanTrack</div>

        <nav class="sidebar-nav">
            <button class="sidebar-link active" data-page="overview">📊 Overview</button>
            <button class="sidebar-link" data-page="issues">⚠️ Issues</button>
            <button class="sidebar-link" data-page="users">👥 Users</button>
            <button class="sidebar-link" data-page="settings">⚙️ Settings</button>
        </nav>

        <a href="index.html" class="sidebar-logout">Logout</a>
    </aside>

    <!-- MAIN -->
    <main class="admin-main" id="adminMain">

        <header class="admin-header">
            <div>
                <h1>Admin Dashboard</h1>
                <p>Manage and monitor community issues</p>
            </div>

            <div class="admin-avatar">👤</div>
        </header>

        <div class="admin-content">

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card"><p>Total Issues</p><h3 id="totalIssues">0</h3></div>
                <div class="stat-card"><p>Pending</p><h3 id="pendingIssues">0</h3></div>
                <div class="stat-card"><p>In Progress</p><h3 id="inProgressIssues">0</h3></div>
                <div class="stat-card"><p>Resolved</p><h3 id="resolvedIssues">0</h3></div>
            </div>

            <!-- TABLE -->
            <div class="issues-table-container">
                <h2>Recent Issues</h2>

                <table class="issues-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Location</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Upvotes</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="adminIssuesTable"></tbody>
                </table>
            </div>

            <!-- CHART -->
            <div class="chart-container">
                <h2>Issues Reported This Week</h2>
                <div class="bar-chart" id="weeklyChart"></div>
            </div>

        </div>
    </main>

</div>

<!-- ✅ ONLY ONE SCRIPT -->
<script src="./Admin.js"></script>

</body>
</html>
