<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanTrack - Reset Password</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link rel="stylesheet" href="../Styles/passRecovery.css" />
  </head>

  <body>
    <!-- Header -->
    <header class="header">
      <nav class="navbar">
        <div class="logo">Urban Track</div>

        <ul class="nav-links">
          <li><div id="google_translate_element"></div></li>
          <li><a href="../../homePage.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="signUpPage.html">Sign Up</a></li>
        </ul>

        <div class="menu-button">
          <div class="menu-button__burger"></div>
        </div>
      </nav>
    </header>

    <main class="page">
      <div class="wrapper">
        <section class="card">
          <a class="back" href="login.html">Back to login</a>

          <div class="icon-circle">
            <span><i class="fas fa-key"></i></span>
          </div>

          <h1 class="card-title">Password Recovery</h1>

          <p class="card-sub">
            Enter your email address to receive a one-time code to reset your password.
          </p>

          <form class="reset-form" novalidate>
            <div class="step step-email active">
              <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="example@gmail.com" required />
                <small class="hint err"></small>
              </div>

              <button class="btn-main" onclick="resetPassword()" type="button">
                Send Reset Code
              </button>
            </div>

            <div class="step step-otp">
              <p class="card-sub">Enter the 6-digit code sent to your email.</p>

              <div class="otp-row">
                <input maxlength="1" class="otp-box" />
                <input maxlength="1" class="otp-box" />
                <input maxlength="1" class="otp-box" />
                <input maxlength="1" class="otp-box" />
                <input maxlength="1" class="otp-box" />
                <input maxlength="1" class="otp-box" />
              </div>

              <button class="btn-main" onclick="verifyOtp()" type="button">
                Verify OTP
              </button>

              <button class="btn-ghost" onclick="showEmailStep()" type="button">
                Edit email
              </button>
            </div>

            <div class="step step-password">
              <p class="card-sub">Enter your new password.</p>

              <input id="password" type="password" />
              <input id="confirmPassword" type="password" />

              <button class="btn-main" onclick="saveNewPassword()" type="button">
                Reset Password
              </button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
      // ✅ FIXED API URL
      const AUTH_API_BASE = "https://dsw02a1technexus-production.up.railway.app";

      async function postAuthJson(path, payload) {
        let response;

        try {
          response = await fetch(AUTH_API_BASE + path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        } catch (error) {
          throw new Error("Cannot reach the server. Please try again later.");
        }

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.error || "Request failed");
        }

        return data;
      }

      window.resetPassword = async function () {
        const email = document.getElementById("email").value;

        try {
          await postAuthJson("/api/email/password-otp", { email });
          window.recoveryEmail = email;
          alert("OTP sent");
        } catch (err) {
          alert(err.message);
        }
      };

      window.verifyOtp = async function () {
        const otp = Array.from(document.querySelectorAll(".otp-box"))
          .map(b => b.value)
          .join("");

        try {
          await postAuthJson("/api/email/verify-password-otp", {
            email: window.recoveryEmail,
            otp
          });

          window.recoveryOtp = otp;
          alert("OTP verified");
        } catch (err) {
          alert(err.message);
        }
      };

      window.saveNewPassword = async function () {
        const password = document.getElementById("password").value;

        try {
          await postAuthJson("/api/email/reset-password", {
            email: window.recoveryEmail,
            otp: window.recoveryOtp,
            password
          });

          alert("Password reset successful");
        } catch (err) {
          alert(err.message);
        }
      };
    </script>
  </body>
</html>
