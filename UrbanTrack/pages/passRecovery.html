<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../Styles/passRecovery.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Urban Track</div>

      <!-- <ul class="nav-links">
        <li><a href="../../homePage.html">Home</a></li>
        <li><a href="signUpPage.html">Sign Up</a></li>
      </ul> -->
    </nav>
    <a class="back" href="login.html"
      ><i class="fa-solid fa-angle-left"></i>
    </a>
    <!-- <h1 class="heading">Password Recovery</h1> -->
    <form action="/recover" method="POST" novalidate>
        <h1 class="heading">Password Recovery</h1>
      <div class="container">
        <div class="form-group">
          <p>Enter your email address to receive a password reset link.</p>
          <br /><br />
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
          <small class="error"></small>
          <button class="btn" id="resetBtn" type="button">
            Send Reset Link
          </button>
        </div>
      </div>
    </form>

    <script src="../js/main.js"></script>
    <script>
      document
        .getElementById("resetBtn")
        .addEventListener("click", function (e) {
          e.preventDefault();
          const emailInput = document.getElementById("email");
          const emailValue = emailInput.value.trim();

          if (!emailValue) {
            setError(emailInput, "Email is required.");
          } else if (!validateEmail(emailValue)) {
            setError(emailInput, "Please enter a valid email address.");
          } else {
            clearError(emailInput);
            // Submit the form if valid
            document.querySelector("form").submit();
          }
        });
    </script>
  </body>
</html>
