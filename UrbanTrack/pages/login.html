    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD4Wy3nmsbaUWGF-rh6ubXvCmAAKhho49U",
        authDomain: "urban-track-91e53.firebaseapp.com",
        projectId: "urban-track-91e53",
        storageBucket: "urban-track-91e53.firebasestorage.app",
        messagingSenderId: "519209303536",
        appId: "1:519209303536:web:c212eb58eb836e27047135",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const googleProvider = new GoogleAuthProvider();

      // Password Visibility Toggle
      const passwordGroup = document.querySelector(".password-group");
      const passwordInput = document.getElementById("password");
      const showBtn = passwordGroup.querySelector(".fa-eye");
      const hideBtn = passwordGroup.querySelector(".fa-eye-slash");

      showBtn.addEventListener("click", () => {
        passwordInput.type = "text";
        showBtn.classList.add("hide");
        hideBtn.classList.remove("hide");
      });

      hideBtn.addEventListener("click", () => {
        passwordInput.type = "password";
        hideBtn.classList.add("hide");
        showBtn.classList.remove("hide");
      });

      const form = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const loginError = passwordGroup.querySelector(".error");

      function showLoginError() {
        emailInput.classList.add("input-error");
        passwordInput.classList.add("input-error");
        loginError.textContent = "Incorrect credentials.";
      }

      function clearLoginError() {
        emailInput.classList.remove("input-error");
        passwordInput.classList.remove("input-error");
        loginError.textContent = "";
      }

      emailInput.addEventListener("input", clearLoginError);
      passwordInput.addEventListener("input", clearLoginError);

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearLoginError();

        const emailValue = emailInput.value.trim();
        const passwordValue = passwordInput.value;

        if (!emailValue || !passwordValue) {
          showLoginError();
          return;
        }

        try {
          // Special Admin Check
          if (
            emailValue === "admin@urbantrack.com" &&
            passwordValue === "Admin@1234"
          ) {
            localStorage.setItem(
              "urbanTrack_currentUser",
              JSON.stringify({
                email: emailValue,
                role: "admin",
                name: "Administrator",
              }),
            );
            localStorage.setItem("userEmail", emailValue);
            window.location.href = "../Adminside/AdminDashboard.html";
            return;
          }

          const userCredential = await signInWithEmailAndPassword(
            auth,
            emailValue,
            passwordValue,
          );
          const user = userCredential.user;

          // Fetch user details from Firestore
          const userDoc = await getDoc(doc(db, "users", user.uid));
          let userData = {
            uid: user.uid,
            email: user.email,
            role: "user",
          };

          if (userDoc.exists()) {
            const data = userDoc.data();
            userData = {
              ...userData,
              ...data,
              name: data.surname || "", // Map surname to name for display compatibility
              uid: user.uid, // Ensure uid is present for reference
            };
          }

          // Save session data for use in dashboards
          localStorage.setItem(
            "urbanTrack_currentUser",
            JSON.stringify(userData),
          );
          localStorage.setItem("userEmail", user.email);

          // Redirect based on user role
          if (userData.role === "admin") {
            window.location.href = "../Adminside/AdminDashboard.html";
          } else {
            window.location.href = "MainPage.html";
          }
        } catch (error) {
          console.error("Login error:", error);
          showLoginError();
        }
      });

      const googleBtn = document.getElementById("google-login-btn");
      if (googleBtn) {
        googleBtn.addEventListener("click", async (e) => {
          e.preventDefault();
          try {
            const result = await signInWithPopup(auth, googleProvider);
            const user = result.user;

            if (!user) {
              throw new Error("Google sign in failed. Please try again.");
            }

            const userData = {
              uid: user.uid,
              email: user.email || "",
              name: user.displayName || "",
              photoURL: user.photoURL || "",
              role: "user",
            };

            await setDoc(doc(db, "users", user.uid), userData, {
              merge: true,
            });

            localStorage.setItem("urbanTrack_currentUser", JSON.stringify(userData));
            localStorage.setItem("userEmail", user.email || "");
            window.location.href = "MainPage.html";
          } catch (error) {
            console.error("Google login error:", error);
            alert(error.message || "Google login failed. Please try again.");
          }
        });
      }

      function initLogin() {
        const loginForm = document.getElementById("loginForm");
        if (!loginForm) return;

        const loginEmail = document.getElementById("text");
        const loginPassword = document.getElementById("password");

        loginForm.addEventListener("submit", (e) => {
          e.preventDefault();
          let valid = true;

          // Email validation
          if (!loginEmail.value.trim()) {
            setError(loginEmail, "Email is required.");
            valid = false;
          } else if (!validateEmail(loginEmail.value.trim())) {
            setError(loginEmail, "Please enter a valid email address.");
            valid = false;
          } else {
            clearError(loginEmail);
          }

          // Password validation
          if (!loginPassword.value.trim()) {
            setError(loginPassword, "Password is required.");
            valid = false;
            // } else if (loginPassword.value.length < 6) {
            //     setError(loginPassword, "Password must be at least 6 characters.");
            //     valid = false;
          } else {
            clearError(loginPassword);
          }
        });
      }
    </script>

    <!-- Google api -->
 <script>
       
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        { pageLanguage: 'en' },
        'google_translate_element'
    );
}

// Hide Google Translate banner whenever it appears
function hideGoogleTranslateBanner() {
    // Remove the top offset Google adds to body
    document.body.style.top = '0px';
    
    // Hide the banner frame
    const banner = document.querySelector('.goog-te-banner-frame');
    if (banner) {
        banner.style.display = 'none';
    }

    // Also target the iframe by id
    const bannerById = document.getElementById(':1.container');
    if (bannerById) {
        bannerById.style.display = 'none';
    }
}

// Run on page load
hideGoogleTranslateBanner();

// Watch for DOM changes (when Google injects the banner after language select)
const observer = new MutationObserver(function(mutations) {
    hideGoogleTranslateBanner();
});

observer.observe(document.body, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ['style']
});


</script>
<script type="text/javascript"
src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit">
</script>
